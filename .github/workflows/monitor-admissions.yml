name: Monitor admissions pages

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check official admissions pages
        run: node scripts/check-admissions-sites.mjs
      - name: Commit monitor update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/admissions-monitor.json
          if git diff --cached --quiet; then
            echo "No monitor changes to commit."
          else
            git commit -m "Update admissions page monitor"
            git push
          fi
